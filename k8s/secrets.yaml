apiVersion: v1
kind: Secret
metadata:
  name: docrecords-secrets      # Name we'll reference in Deployments
  namespace: docrecords          # Must belong to our namespace
type: Opaque                     # "Opaque" = generic key-value secret (vs TLS or registry secrets)
data:
  # All values MUST be base64 encoded using: echo -n "value" | base64
  # WARNING: Use 'echo -n' (not plain 'echo') to avoid encoding a trailing newline!
  DB_ROOT_PASSWORD: cm9vdA==           # echo -n "root" | base64
  DB_PASSWORD: RG9jX1JlY29yZHMxMjM=   # echo -n "Doc_Records123" | base64
  DB_USER: ZG9jcmVjb3Jkcw==           # echo -n "docrecords" | base64
  JWT_SECRET: c3VwZXJzZWNyZXRrZXk=   # echo -n "supersecretkey" | base64
