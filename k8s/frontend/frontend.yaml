apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: docrecords
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docrecords_dockercompose-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: docrecords
spec:
  type: NodePort
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30073
  selector:
    app: frontend

