apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: docrecords
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 4000               # Port the Service listens on internally
      targetPort: 4000         # Port on the container
      nodePort: 30000          # Exposed on host at http://<node-ip>:30000
  type: NodePort
  # NOTE: The frontend React app has hardcoded "http://localhost:4000" URLs.
  # Since the browser makes API calls (not the pod), it calls the node's IP.
  # To access: kubectl port-forward -n docrecords svc/api-gateway-service 4000:4000
  # This forwards the NodePort to localhost:4000 matching the hardcoded frontend URLs.
