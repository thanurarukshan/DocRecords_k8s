apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: docrecords
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: docrecords_dockercompose-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_USER
              value: root
            - name: DB_PASSWORD
              value: root
            - name: DB_NAME
              value: auth_db
            - name: DB_PORT
              value: "3306"
            - name: JWT_SECRET
              value: supersecretkey
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: docrecords
spec:
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: auth-service
