apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-control-service
  namespace: docrecords
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-control-service
  template:
    metadata:
      labels:
        app: profile-control-service
    spec:
      containers:
        - name: profile-control-service
          image: docrecords/profile-control-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5008
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: docrecords-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: docrecords-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: docrecords-config
                  key: PROFILE_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: docrecords-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docrecords-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: docrecords-secrets
                  key: JWT_SECRET
