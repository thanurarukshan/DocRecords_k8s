apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: docrecords
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: docrecords_dockercompose-patient-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_USER
              value: root
            - name: DB_PASS
              value: root
            - name: DB_NAME
              value: docrecords
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: docrecords
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: patient-service

