apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: docrecords
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: docrecords_dockercompose-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service:5000"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:5003"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:5004"
            - name: PRESCRIPTION_SERVICE_URL
              value: "http://prescription-service:5004"
            - name: PROFILE_SERVICE_URL
              value: "http://profile-control-service:5008"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: docrecords
spec:
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: api-gateway
